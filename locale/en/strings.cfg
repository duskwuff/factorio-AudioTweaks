[mod-setting-name]
AudioTweaks-item-pick=Item pickup sounds
AudioTweaks-item-drop=Item transfer/drop sounds
AudioTweaks-tools=Tool sounds
AudioTweaks-entity=Entity open/close sounds
AudioTweaks-nve=Night vision sounds

[mod-setting-description]
AudioTweaks-item-pick=Played when the player selects an item.
AudioTweaks-item-drop=Played when the player quick-transfers, deselects, or drops an item.
AudioTweaks-tools=Played when activating/deactivating incorporeal tools like cut/copy or circuit wires.
AudioTweaks-entity=Played when the player opens or closes an entity, like an assembler, chest, or car.
AudioTweaks-nve=Played when night vision turns on/off at sunrise/sunset.

[string-mod-setting]
AudioTweaks-item-pick-default=Default
AudioTweaks-item-pick-basic=Basic sounds
AudioTweaks-item-pick-mute=No sounds

AudioTweaks-item-drop-default=Default
AudioTweaks-item-drop-basic=Basic sounds
AudioTweaks-item-drop-mute=No sounds

AudioTweaks-tools-default=Default
AudioTweaks-tools-basic=Basic sounds
AudioTweaks-tools-mute=No sounds

AudioTweaks-entity-default=Default
AudioTweaks-entity-basic=Basic sounds
AudioTweaks-entity-mute=No sounds

AudioTweaks-nve-default=Default
AudioTweaks-nve-mute=No sounds
