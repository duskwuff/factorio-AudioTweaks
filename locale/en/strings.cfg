[mod-setting-description]
AudioTweaks-item-pick=Control sounds played when the player selects an item.
AudioTweaks-item-drop=Control sounds played when the player quick-transfers, deselects, or drops an item.
AudioTweaks-tools=Control sounds played when activating/deactivating incorporeal tools like cut/copy or circuit wires.
AudioTweaks-entity=Control sounds played when the player opens or closes an entity, like an assembler, chest, or car.
AudioTweaks-nve=Control sounds played when night vision turns on/off, typically at sunrise or sunset.
AudioTweaks-bots=Control noises made by bots as they fly around and wait to charge.
AudioTweaks-combinators=Control noises made by combinators as they combinate.
AudioTweaks-armor=Control noises made by mech armor.

